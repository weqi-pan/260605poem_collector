        prompt_template:
        - id: 4c8a985b-08d2-4145-b223-8bf0dc6f2494
          role: system
          text: "## 角色\n你是一个专业的SQL查询生成器，负责根据用户的古诗查询需求创建标准的MySQL数据库SQL语句。\n\n## 任务\n\
            根据以下问题，生成一个格式清晰、结构明确的JSON数组，其中每个元素是一条合法且性能优化的MySQL查询语句。\n\n### 表信息\n表名：poem（古诗信息表）\n\
            \n### 字段说明\n- id: 主键\n- category: 诗歌体裁，例如五言绝句、七言绝句、五言律诗、七言律诗、五言古诗、七言古诗、乐府\n\
            - title: 诗名\n- author: 作者\n- dynasty: 朝代\n- content: 诗歌正文\n- analysis:\
            \ 诗歌解析或赏析，可为空\n- url: 原始来源链接\n- created_at: 记录创建时间\n- updated_at: 记录更新时间\n\
            \n### 输出要求\n1. 根据用户的问题，生成最多10条直接关联问题的SQL查询语句。\n2. 每条SQL应从不同查询角度切入，例如按诗名、作者、体裁、朝代、正文关键词、解析关键词等维度检索。\n\
            3. 所有SQL必须语法正确、可执行，并注重性能优化，避免使用 `SELECT *`，只查询回答问题所需字段。\n4. 若用户问题包含明确诗名，应优先使用\
            \ `title` 精确匹配；若可能是模糊标题或片段，可补充使用 `LIKE` 查询。\n5. 若用户问题包含作者姓名，应优先使用 `author`\
            \ 精确匹配，并可结合 `category`、`title`、`dynasty` 进行排序或过滤。\n6. 若用户问题包含诗句、关键词、意象或内容片段，应使用\
            \ `content LIKE '%关键词%'` 查询，并返回诗名、作者、朝代、正文和解析。\n7. 若用户询问赏析、解析、含义、表达情感等内容，应优先查询\
            \ `analysis` 字段，同时返回 `title`、`author`、`content`。\n8. 若用户询问某类诗歌数量或分布，应使用\
            \ `COUNT`、`GROUP BY` 等聚合查询，例如按作者、体裁或朝代统计。\n9. 对于全量列表类查询，必须添加合理的 `ORDER\
            \ BY id ASC` 和 `LIMIT`，默认限制在20条以内。\n10. 最终输出必须是纯JSON数组格式，以 ```json 开头，以\
            \ ``` 结尾，不包含任何额外解释或文本，其中每个元素必须是对象，且仅包含一个字段：`\"sql\"`（字符串类型），格式示例：\n  \
            \ ```json\n   [\n     { \"sql\": \"SELECT title, author, dynasty, content,\
            \ analysis FROM poem WHERE title = '登鹳雀楼' LIMIT 20;\" },\n     { \"sql\"\
            : \"SELECT title, category FROM poem WHERE author = '王维' ORDER BY category\
            \ ASC, id ASC LIMIT 20;\" }\n   ]\n```\n请严格按照上述格式和要求生成响应。"
        - id: 564e66a3-f868-43ed-96d4-6d1ebd985093
          role: user
          text: 查询王维的古诗作品，并统计不同体裁的数量
        - id: 996aadab-e8bc-4a7c-921c-6a2771f50020
          role: assistant
          text: "```json\n[\n  {\n    \"title\": \"查询王维的古诗作品列表\",\n    \"sql\": \"\
            SELECT title, category, dynasty, content, analysis FROM poem WHERE author\
            \ = '王维' ORDER BY category ASC, id ASC LIMIT 20;\"\n  },\n  {\n    \"\
            title\": \"统计王维不同体裁的作品数量\",\n    \"sql\": \"SELECT category, COUNT(*)\
            \ AS poem_count FROM poem WHERE author = '王维' GROUP BY category ORDER\
            \ BY poem_count DESC;\"\n  },\n  {\n    \"title\": \"查询王维作品中包含相思意象的诗歌\"\
            ,\n    \"sql\": \"SELECT title, author, dynasty, category, content, analysis\
            \ FROM poem WHERE author = '王维' AND (content LIKE '%相思%' OR analysis LIKE\
            \ '%相思%') ORDER BY id ASC LIMIT 20;\"\n  }\n]\n```"
        selected: false
        title: LLM生成SQL语句
        type: llm
        vision:
          enabled: false
