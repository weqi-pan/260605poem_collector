    - data:
        code: "import re\nimport json\n\n\ndef split_values(text):\n    if not text:\n\
          \        return []\n    return [\n        item.strip()\n        for item\
          \ in re.split(r\"[;；]\", text)\n        if item.strip()\n    ]\n\n\ndef\
          \ parse_json_from_text(text):\n    match = re.search(r\"```json\\s*([\\\
          s\\S]*?)\\s*```\", text)\n    if match:\n        json_text = match.group(1).strip()\n\
          \    else:\n        json_text = text.strip()\n\n    return json.loads(json_text)\n\
          \n\ndef main(value: str) -> dict:\n    data = parse_json_from_text(value)\n\
          \n    get_types = split_values(data.get(\"getType\", \"\"))\n    titles\
          \ = split_values(data.get(\"title\", \"\"))\n    authors = split_values(data.get(\"\
          author\", \"\"))\n    categories = split_values(data.get(\"category\", \"\
          \"))\n\n    iteration_items = []\n\n    for get_type in get_types:\n   \
          \     if get_type == \"诗人\":\n            for author in authors:\n     \
          \           iteration_items.append({\n                    \"getType\": \"\
          诗人\",\n                    \"title\": \"\",\n                    \"author\"\
          : author,\n                    \"category\": \"\"\n                })\n\n\
          \        elif get_type == \"古诗名\":\n            for title in titles:\n \
          \               iteration_items.append({\n                    \"getType\"\
          : \"古诗名\",\n                    \"title\": title,\n                    \"\
          author\": \"\",\n                    \"category\": \"\"\n              \
          \  })\n\n        elif get_type == \"更新诗歌数据\":\n            update_authors\
          \ = authors[-1:] if authors else []\n\n            for author in update_authors:\n\
          \                for category in categories:\n                    iteration_items.append({\n\
          \                        \"getType\": \"更新诗歌数据\",\n                    \
          \    \"title\": \"\",\n                        \"author\": author,\n   \
          \                     \"category\": category\n                    })\n\n\
          \    return {\n        \"results\": data.get(\"results\", \"\"),\n     \
          \   \"get_information\": data.get(\"get_information\", \"0\"),\n       \
          \ \"iteration_items\": iteration_items\n    }"
