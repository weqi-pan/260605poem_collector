<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>古诗采集与查询</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #1f2933;
      --muted: #667085;
      --line: #d6dde6;
      --panel: #ffffff;
      --wash: #f4f7f5;
      --accent: #23615b;
      --accent-strong: #17443f;
      --gold: #a56a22;
      --danger: #a83232;
      --shadow: 0 10px 28px rgba(27, 39, 51, .08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Microsoft YaHei", "PingFang SC", system-ui, sans-serif;
      color: var(--ink);
      background:
        linear-gradient(90deg, rgba(35, 97, 91, .08), transparent 32%),
        linear-gradient(180deg, #fbfaf7, var(--wash));
    }

    header {
      border-bottom: 1px solid rgba(31, 41, 51, .1);
      background: rgba(255, 255, 255, .78);
      backdrop-filter: blur(12px);
    }

    .bar {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 18px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    h1 {
      margin: 0;
      font-size: 24px;
      font-weight: 700;
      letter-spacing: 0;
    }

    .token {
      display: grid;
      grid-template-columns: auto minmax(160px, 260px);
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--muted);
    }

    main {
      width: min(1180px, calc(100% - 32px));
      margin: 24px auto 40px;
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 18px;
    }

    .side,
    .workspace {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .side {
      padding: 16px;
      align-self: start;
    }

    .workspace {
      min-height: 560px;
      overflow: hidden;
    }

    .tabs {
      display: grid;
      gap: 8px;
    }

    .tab {
      width: 100%;
      border: 1px solid transparent;
      background: #f7f9f8;
      color: var(--ink);
      text-align: left;
      padding: 12px 14px;
      border-radius: 6px;
      cursor: pointer;
      font: inherit;
      font-weight: 650;
    }

    .tab.active {
      border-color: rgba(35, 97, 91, .35);
      background: rgba(35, 97, 91, .1);
      color: var(--accent-strong);
    }

    .field {
      display: grid;
      gap: 7px;
      margin: 14px 0;
    }

    label {
      font-size: 13px;
      color: var(--muted);
    }

    input,
    select {
      width: 100%;
      min-height: 40px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 9px 10px;
      font: inherit;
      background: #fff;
      color: var(--ink);
    }

    input:focus,
    select:focus {
      outline: 2px solid rgba(35, 97, 91, .18);
      border-color: var(--accent);
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 14px;
    }

    button.primary,
    button.secondary {
      min-height: 40px;
      border-radius: 6px;
      border: 1px solid var(--accent);
      padding: 9px 14px;
      cursor: pointer;
      font: inherit;
      font-weight: 650;
    }

    button.primary {
      background: var(--accent);
      color: white;
    }

    button.secondary {
      background: white;
      color: var(--accent-strong);
    }

    button:disabled {
      opacity: .55;
      cursor: not-allowed;
    }

    .panel {
      display: none;
      padding: 20px;
    }

    .panel.active {
      display: block;
    }

    .panel h2 {
      margin: 0 0 16px;
      font-size: 20px;
    }

    .status {
      min-height: 24px;
      margin-top: 12px;
      color: var(--muted);
      font-size: 14px;
    }

    .status.error {
      color: var(--danger);
    }

    .results {
      display: grid;
      gap: 12px;
      margin-top: 18px;
    }

    .poem,
    .row,
    .summary {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      background: #fff;
    }

    .poem-title {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 12px;
      margin-bottom: 10px;
    }

    .poem-title strong {
      font-size: 18px;
    }

    .meta {
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }

    .content {
      margin: 0;
      line-height: 1.9;
      white-space: pre-wrap;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
    }

    .metric {
      border-left: 3px solid var(--gold);
      padding-left: 10px;
    }

    .metric b {
      display: block;
      font-size: 24px;
    }

    .muted {
      color: var(--muted);
      font-size: 13px;
    }

    @media (max-width: 780px) {
      .bar,
      main {
        width: min(100% - 20px, 1180px);
      }

      .bar {
        display: grid;
      }

      .token {
        grid-template-columns: 1fr;
      }

      main {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="bar">
      <h1>古诗采集与查询</h1>
      <div class="token">
        <label for="token">Bearer Token</label>
        <input id="token" type="password" value="123456" autocomplete="off">
      </div>
    </div>
  </header>

  <main>
    <aside class="side">
      <nav class="tabs" aria-label="功能">
        <button class="tab active" data-tab="title">诗名查询</button>
        <button class="tab" data-tab="author">作者作品</button>
        <button class="tab" data-tab="crawl">采集任务</button>
      </nav>
    </aside>

    <section class="workspace">
      <div class="panel active" id="panel-title">
        <h2>诗名查询</h2>
        <div class="field">
          <label for="titleInput">诗名</label>
          <input id="titleInput" value="登鹳雀楼">
        </div>
        <div class="actions">
          <button class="primary" id="titleSearch">查询</button>
          <button class="secondary" data-fill-title="相思">相思</button>
          <button class="secondary" data-fill-title="静夜思">静夜思</button>
        </div>
        <div class="status" id="titleStatus"></div>
        <div class="results" id="titleResults"></div>
      </div>

      <div class="panel" id="panel-author">
        <h2>作者作品</h2>
        <div class="field">
          <label for="authorInput">作者</label>
          <input id="authorInput" value="王维">
        </div>
        <div class="actions">
          <button class="primary" id="authorSearch">查询</button>
          <button class="secondary" data-fill-author="李白">李白</button>
          <button class="secondary" data-fill-author="杜甫">杜甫</button>
        </div>
        <div class="status" id="authorStatus"></div>
        <div class="results" id="authorResults"></div>
      </div>

      <div class="panel" id="panel-crawl">
        <h2>采集任务</h2>
        <div class="field">
          <label for="categoryInput">体裁</label>
          <select id="categoryInput">
            <option>五言绝句</option>
            <option>七言绝句</option>
            <option>五言律诗</option>
            <option>七言律诗</option>
            <option>五言古诗</option>
            <option>七言古诗</option>
            <option>乐府</option>
          </select>
        </div>
        <div class="field">
          <label for="crawlAuthorInput">作者</label>
          <input id="crawlAuthorInput" value="王维">
        </div>
        <div class="actions">
          <button class="primary" id="crawlStart">开始采集</button>
        </div>
        <div class="status" id="crawlStatus"></div>
        <div class="results" id="crawlResults"></div>
      </div>
    </section>
  </main>

  <script>
    const state = {
      tokenInput: document.querySelector("#token")
    };

    function authHeaders(extra = {}) {
      return {
        Authorization: `Bearer ${state.tokenInput.value.trim()}`,
        ...extra
      };
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function setStatus(id, text, isError = false) {
      const el = document.querySelector(id);
      el.textContent = text;
      el.classList.toggle("error", isError);
    }

    async function requestJson(url, options = {}) {
      const response = await fetch(url, options);
      if (!response.ok) {
        let message = `${response.status} ${response.statusText}`;
        try {
          const payload = await response.json();
          message = payload.detail || message;
        } catch (_) {}
        throw new Error(message);
      }
      return response.json();
    }

    function renderPoems(rows) {
      if (!rows.length) {
        return '<div class="summary">未找到匹配诗歌。</div>';
      }
      return rows.map(row => `
        <article class="poem">
          <div class="poem-title">
            <strong>${escapeHtml(row.title)}</strong>
            <span class="meta">${escapeHtml(row.dynasty)} · ${escapeHtml(row.author)}</span>
          </div>
          <p class="content">${escapeHtml(row.content)}</p>
        </article>
      `).join("");
    }

    function renderTitles(rows) {
      if (!rows.length) {
        return '<div class="summary">未找到该作者的作品。</div>';
      }
      const byCategory = rows.reduce((acc, row) => {
        acc[row.category] = (acc[row.category] || 0) + 1;
        return acc;
      }, {});
      const metrics = Object.entries(byCategory)
        .map(([category, count]) => `
          <div class="metric">
            <b>${count}</b>
            <span>${escapeHtml(category)}</span>
          </div>
        `).join("");
      const list = rows.map(row => `
        <div class="row">
          <strong>${escapeHtml(row.title)}</strong>
          <span class="meta">${escapeHtml(row.category)}</span>
        </div>
      `).join("");
      return `
        <div class="summary">
          <div class="grid">${metrics}</div>
          <p class="muted">共 ${rows.length} 首</p>
        </div>
        ${list}
      `;
    }

    function renderCrawl(result) {
      const failures = result.failed?.length
        ? result.failed.map(item => `
          <div class="row">
            <strong>${escapeHtml(item.title)}</strong>
            <p class="muted">${escapeHtml(item.error)}</p>
          </div>
        `).join("")
        : '<div class="row">无失败项。</div>';
      return `
        <div class="summary">
          <div class="grid">
            <div class="metric"><b>${result.matched}</b><span>匹配</span></div>
            <div class="metric"><b>${result.inserted}</b><span>新增</span></div>
            <div class="metric"><b>${result.skipped}</b><span>跳过</span></div>
            <div class="metric"><b>${result.failed.length}</b><span>失败</span></div>
          </div>
        </div>
        ${failures}
      `;
    }

    async function searchByTitle() {
      const title = document.querySelector("#titleInput").value.trim();
      const output = document.querySelector("#titleResults");
      if (!title) return setStatus("#titleStatus", "请输入诗名。", true);
      setStatus("#titleStatus", "查询中...");
      output.innerHTML = "";
      try {
        const rows = await requestJson(`/poems/by-title?title=${encodeURIComponent(title)}`, {
          headers: authHeaders()
        });
        output.innerHTML = renderPoems(rows);
        setStatus("#titleStatus", `返回 ${rows.length} 条结果。`);
      } catch (error) {
        setStatus("#titleStatus", error.message, true);
      }
    }

    async function searchByAuthor() {
      const author = document.querySelector("#authorInput").value.trim();
      const output = document.querySelector("#authorResults");
      if (!author) return setStatus("#authorStatus", "请输入作者。", true);
      setStatus("#authorStatus", "查询中...");
      output.innerHTML = "";
      try {
        const rows = await requestJson(`/poets/${encodeURIComponent(author)}/titles`, {
          headers: authHeaders()
        });
        output.innerHTML = renderTitles(rows);
        setStatus("#authorStatus", `返回 ${rows.length} 条结果。`);
      } catch (error) {
        setStatus("#authorStatus", error.message, true);
      }
    }

    async function startCrawl() {
      const category = document.querySelector("#categoryInput").value;
      const author = document.querySelector("#crawlAuthorInput").value.trim();
      const output = document.querySelector("#crawlResults");
      if (!author) return setStatus("#crawlStatus", "请输入作者。", true);
      setStatus("#crawlStatus", "采集中...");
      output.innerHTML = "";
      try {
        const result = await requestJson("/crawl", {
          method: "POST",
          headers: authHeaders({ "Content-Type": "application/json" }),
          body: JSON.stringify({ category, author })
        });
        output.innerHTML = renderCrawl(result);
        setStatus("#crawlStatus", "采集完成。");
      } catch (error) {
        setStatus("#crawlStatus", error.message, true);
      }
    }

    document.querySelectorAll(".tab").forEach(tab => {
      tab.addEventListener("click", () => {
        document.querySelectorAll(".tab").forEach(item => item.classList.remove("active"));
        document.querySelectorAll(".panel").forEach(item => item.classList.remove("active"));
        tab.classList.add("active");
        document.querySelector(`#panel-${tab.dataset.tab}`).classList.add("active");
      });
    });

    document.querySelector("#titleSearch").addEventListener("click", searchByTitle);
    document.querySelector("#authorSearch").addEventListener("click", searchByAuthor);
    document.querySelector("#crawlStart").addEventListener("click", startCrawl);
    document.querySelector("#titleInput").addEventListener("keydown", event => {
      if (event.key === "Enter") searchByTitle();
    });
    document.querySelector("#authorInput").addEventListener("keydown", event => {
      if (event.key === "Enter") searchByAuthor();
    });
    document.querySelector("#crawlAuthorInput").addEventListener("keydown", event => {
      if (event.key === "Enter") startCrawl();
    });
    document.querySelectorAll("[data-fill-title]").forEach(button => {
      button.addEventListener("click", () => {
        document.querySelector("#titleInput").value = button.dataset.fillTitle;
        searchByTitle();
      });
    });
    document.querySelectorAll("[data-fill-author]").forEach(button => {
      button.addEventListener("click", () => {
        document.querySelector("#authorInput").value = button.dataset.fillAuthor;
        searchByAuthor();
      });
    });
  </script>

    };
  </script>

    }

    }
  </style>
</body>
</html>
